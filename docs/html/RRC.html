            "popup": "\n                <div style=\"text-align: center; max-width:  600px\">\n                    <h2 style=\"margin: 0 0 10px 0; color: #2c3e50;\">Juno Beach<br>06 Jul 44<br> Landing</h2>\n                     \n                    <div style=\"text-align: left; padding: 0 10px;\">\n                       <p>'The convoy laid anchor about 1800 hrs just off Juno Beach and started unloading onto LCTs. Work was continued until about 2300 hrs when it became too dark.<br></p>\n                        \n                    </div>\n                </div>\n                    ",

          {

            ],
            "popup": "\n                <div style=\"text-align: center; max-width:  600px\">\n                    <h2 style=\"margin: 0 0 10px 0; color: #2c3e50;\">Courseulles<br>07 Jul 44<br>  </h2>\n                    <img src=\"https://pd-allen.github.io/docs/images/JunoLandings.jpg\" width=\"550px\" style=\"border-radius:8px;\">\n                    <div style=\"text-align: left; padding: 0 10px;\">\n                       <p>'Battalion finished unloading about 1400 and all vehicles were dewaterproofed.<br></p>\n                        \n                    </div>\n                </div>\n                    ",
            "tooltip": "\n                    <div style=\"text-align: center;\">\n                        <h2>Courseulles<br>07 Jul 44<br></h2>\n                        <p> <br></p>\n                    </div>\n                    "

          {
            "lngLat": [
              -0.59288,

            ],
            "popup": "\n                <div style=\"text-align: center; max-width:  600px\">\n                    <h2 style=\"margin: 0 0 10px 0; color: #2c3e50;\">Bazenville<br>08 Jul 44<br>  </h2>\n                     \n                    <div style=\"text-align: left; padding: 0 10px;\">\n                       <p>'The moring was spent in training. The afternoon the first game of the 4th Canadian Infantry Brigade baseball tournement was played.<br></p>\n                        \n                    </div>\n                </div>\n                    ",
            "tooltip": "\n                    <div style=\"text-align: center;\">\n                        <h2>Bazenville<br>08 Jul 44<br></h2>\n                        <p> <br></p>\n                    </div>\n                    "
          },
          {
            "lngLat": [
              -0.406634,
              49.164599172
            ],
            "popup": "\n                <div style=\"text-align: center; max-width:  600px\">\n                    <h2 style=\"margin: 0 0 10px 0; color: #2c3e50;\">Eterville<br>11 Jul 44<br>  </h2>\n                    <img src=\"https://pd-allen.github.io/docs/images/EtervilleCollage.jpg\" width=\"550px\" style=\"border-radius:8px;\">\n                    <div style=\"text-align: left; padding: 0 10px;\">\n                       <p>'Moving forward to replace the Regina Rifles. The posn at ETERVILLE was one which had been subjected to a tremendous amt of enemy mortar fire and contained small numbers of enemy left there to harass any occupying unit. There were about 50 English dead in the area when we took over and our own casualties from mortars were quite substantial over the period of six days we occupied the area, amounting to nearly 175.<br></p>\n                        \n                    </div>\n                </div>\n                    ",
            "tooltip": "\n                    <div style=\"text-align: center;\">\n                        <h2>Eterville<br>11 Jul 44<br></h2>\n                        <p> <br></p>\n                    </div>\n                    "
          },
          {
            "lngLat": [
              -0.4349523,
              49.157333
            ],
            "popup": "\n                <div style=\"text-align: center; max-width:  600px\">\n                    <h2 style=\"margin: 0 0 10px 0; color: #2c3e50;\">Verson<br>16 Jul 44<br>  </h2>\n                     \n                    <div style=\"text-align: left; padding: 0 10px;\">\n                       <p>'RRC change positions with Essex Scottish and move 1500 yards to the rear.<br></p>\n                        \n                    </div>\n                </div>\n                    ",
            "tooltip": "\n                    <div style=\"text-align: center;\">\n                        <h2>Verson<br>16 Jul 44<br></h2>\n                        <p> <br></p>\n                    </div>\n                    "
          },
          {
            "lngLat": [
              -0.39011938,
              49.157307
            ],
            "popup": "\n                <div style=\"text-align: center; max-width:  600px\">\n                    <h2 style=\"margin: 0 0 10px 0; color: #2c3e50;\">Louvigny<br>19 Jul 44<br> Operation Atlantic</h2>\n                    <img src=\"https://pd-allen.github.io/docs/images/LouvignyMemorial.jpg\" width=\"550px\" style=\"border-radius:8px;\">\n                    <div style=\"text-align: left; padding: 0 10px;\">\n                       <p>'The R Regt C\u00a0had\u00a0been ordered as part of OPERATION ATLANTIC to attack and capture LOUVIGNY with the object of protecting the rt flank of the 5th\u00a0Bde\u00a0while the crossing was in progress. The A/CO's plan was to launch the attack from a start line secured by the\u00a08th\u00a0Recce at LE MESNIL, and proceed across the wheat fields and seep through a large orchard\u00a0surrounded by a stone wall which lay to the north-west of the village. \"D\" Coy was to lead, followed by \"A\" Coy, with \"B\" Coy in support, \"C\" Coy was to establish a\u00a0firm\u00a0base on high\u00a0gd\u00a0west of the village. On reaching the edge of the village, \"D\" Coy was to pass rt on and clear the chateau and the\u00a0woods as far as the line of a railway running north and\u00a0south which crossed the River ORNE between LOUVIGNY and FLEURY-SUR-ORNE. \"A\" Coy was to swing to the rt and clear the village\u00a0itself\u00a0supported by \"B\" Coy, who were to pass through \"A\" Coy and establish themselves at the south-west end of the village in order to guard against any possible counter-attack from the direction of ATHIS which was in enemy hands. The total casualties in this operation were: killed, 4 Officers and 30 ORs; Wounded 2 Officers and 75 ORs. Enemy prisoners captured totalled 55<br></p>\n                        \n                    </div>\n                </div>\n                    ",
            "tooltip": "\n                    <div style=\"text-align: center;\">\n                        <h2>Louvigny<br>19 Jul 44<br></h2>\n                        <p>Operation Atlantic<br></p>\n                    </div>\n                    "
          },
          {
            "lngLat": [
              -0.44755688,
              49.156837
            ],
            "popup": "\n                <div style=\"text-align: center; max-width:  600px\">\n                    <h2 style=\"margin: 0 0 10px 0; color: #2c3e50;\">Verson<br>20 Jul 44<br>  </h2>\n                    <img src=\"https://pd-allen.github.io/docs/images/LouvignyMemorial2.jpg\" width=\"550px\" style=\"border-radius:8px;\">\n                    <div style=\"text-align: left; padding: 0 10px;\">\n                       <p>'Relieved and Returned to Verson for rest and cleanup. Draft  of 6 Officers and 74 OR received to replace losses at Louvigny.<br></p>\n                        \n                    </div>\n                </div>\n                    ",
            "tooltip": "\n                    <div style=\"text-align: center;\">\n                        <h2>Verson<br>20 Jul 44<br></h2>\n                        <p> <br></p>\n                    </div>\n                    "
          },
          {

            "popup": "\n                <div style=\"text-align: center; max-width:  600px\">\n                    <h2 style=\"margin: 0 0 10px 0; color: #2c3e50;\">Ifs<br>21 Jul 44<br>  </h2>\n                     \n                    <div style=\"text-align: left; padding: 0 10px;\">\n                       <p>'Moved up to Ifs. Preparing for Assaults on May-Sur_Orne and Verrieres Ridge as Part of Operation Spring.<br></p>\n                        \n                    </div>\n                </div>\n                    ",
            "tooltip": "\n                    <div style=\"text-align: center;\">\n                        <h2>Ifs<br>21 Jul 44<br></h2>\n                        <p> <br></p>\n                    </div>\n                    "
          },
          {
            "lngLat": [
              -0.34508824,
              49.11747
            ],
            "popup": "\n                <div style=\"text-align: center; max-width:  600px\">\n                    <h2 style=\"margin: 0 0 10px 0; color: #2c3e50;\">Verrieres<br>25 Jul 44<br> Operation Spring</h2>\n                    <img src=\"https://pd-allen.github.io/docs/images/VerrieresSketch1325July.jpg\" width=\"550px\" style=\"border-radius:8px;\">\n                    <div style=\"text-align: left; padding: 0 10px;\">\n                       <p>'Advanced toward Verrieres Ridge at 0330. C Company got over the ridge with very heavy casualties.  Dug in on reverse slope of the ridge. Enemy counterattacked several times the next day with no success. On 27 Jul Germans moved an 88 on the flank and set the wheatfields on fire.  Danger of exploding 1,100 mines averted by extinuishing the fire.<br></p>\n                        \n                    </div>\n                </div>\n                    ",
            "tooltip": "\n                    <div style=\"text-align: center;\">\n                        <h2>Verrieres<br>25 Jul 44<br></h2>\n                        <p>Operation Spring<br></p>\n                    </div>\n                    "

            ],
            "popup": "\n                <div style=\"text-align: center; max-width:  600px\">\n                    <h2 style=\"margin: 0 0 10px 0; color: #2c3e50;\">Ifs<br>28 Jul 44<br>  </h2>\n                     \n                    <div style=\"text-align: left; padding: 0 10px;\">\n                       <p>'RRC relieved by Essex Scottish, retired to Ifs. Quiet night, little shelling<br></p>\n                        \n                    </div>\n                </div>\n                    ",
            "tooltip": "\n                    <div style=\"text-align: center;\">\n                        <h2>Ifs<br>28 Jul 44<br></h2>\n                        <p> <br></p>\n                    </div>\n                    "
          },
          {
            "lngLat": [
              -0.33335018,
              49.121746
            ],
            "popup": "\n                <div style=\"text-align: center; max-width:  600px\">\n                    <h2 style=\"margin: 0 0 10px 0; color: #2c3e50;\">Trotval Farm<br>29 Jul 44<br>  </h2>\n                     \n                    <div style=\"text-align: left; padding: 0 10px;\">\n                       <p>'Moved to Trotval Farm to relieve 1/7 Queens, : \"A\" Coy left-fwd between the CAEN-FALAISE Highway and the track running SOUTH to TROTVAL FARM; \"D\" Coy rt-fwd to the WEST of the track mentioned on the slope of the hill on which BEAUVOIR FARM stands; \"C\" and \"B\" Coys were in posns to the rear of \"A\" and \"D\" Coys respectively.  Heavy shelling during the night.<br></p>\n                        \n                    </div>\n                </div>\n                    ",
            "tooltip": "\n                    <div style=\"text-align: center;\">\n                        <h2>Trotval Farm<br>29 Jul 44<br></h2>\n                        <p> <br></p>\n                    </div>\n                    "
          },
          {
            "lngLat": [
              -0.39161938,
              49.157307
            ],
            "popup": "\n                <div style=\"text-align: center; max-width:  600px\">\n                    <h2 style=\"margin: 0 0 10px 0; color: #2c3e50;\">Louvigny<br>05 Aug 44<br>  </h2>\n                     \n                    <div style=\"text-align: left; padding: 0 10px;\">\n                       <p>'RRC relieved by the Fusiliers Mont Royal and withdrew to Louvigny.  Rest and preparation for Operation Totalize.  2 Cdn Div was to penetrate along the general axis BEAUVOIR Farm--VERRIERES--ROCQUANCOURT--POINT 122. This was to be achieved by lifting 4 Cdn Inf Bde on Priests and Armd Scout Cars, and moving them by night in armd columns in close formation. Heavy aerial bombing on either flank and an artillery barrage and concentrations were to support the attack.<br></p>\n                        \n                    </div>\n                </div>\n                    ",
            "tooltip": "\n                    <div style=\"text-align: center;\">\n                        <h2>Louvigny<br>05 Aug 44<br></h2>\n                        <p> <br></p>\n                    </div>\n                    "
          },
          {
            "lngLat": [
              -0.3416162,
              49.125015
            ],
            "popup": "\n                <div style=\"text-align: center; max-width:  600px\">\n                    <h2 style=\"margin: 0 0 10px 0; color: #2c3e50;\">Trotval Farm<br>07 Aug 44<br> Operation Totalize</h2>\n                    <img src=\"https://pd-allen.github.io/docs/images/TotalizePlan.jpg\" width=\"550px\" style=\"border-radius:8px;\">\n                    <div style=\"text-align: left; padding: 0 10px;\">\n                       <p>'The column was formed up with four vehicles abreast on a 16-yd\u00a0front. A squadron of tanks was in the lead followed by the two forward Rifle Coys who divided the frontage between them. In other words, each Rifle Coy moved with its vehicles two-abreast with another Rifle Coy moving in\u00a0simlar\u00a0formation along-side. At 2155 hrs, the columns moved from the marshalling area to the forward FUP which was just to the north of the road running between TROTEVAL Farm and BEAUVOIR Farm. At 2155 hrs, the columns moved from the marshalling area to the forward FUP which was just to the north of the road running between TROTEVAL Farm and BEAUVOIR Farm. <br></p>\n                        \n                    </div>\n                </div>\n                    ",
            "tooltip": "\n                    <div style=\"text-align: center;\">\n                        <h2>Trotval Farm<br>07 Aug 44<br></h2>\n                        <p>Operation Totalize<br></p>\n                    </div>\n                    "
          },
          {
            "lngLat": [
              -0.316232,
              49.094829
            ],
            "popup": "\n                <div style=\"text-align: center; max-width:  600px\">\n                    <h2 style=\"margin: 0 0 10px 0; color: #2c3e50;\">Rocquancourt<br>08 Aug 44<br> Traffic Jam</h2>\n                    <img src=\"https://pd-allen.github.io/docs/images/TotalizeColumns.JPG\" width=\"550px\" style=\"border-radius:8px;\">\n                    <div style=\"text-align: left; padding: 0 10px;\">\n                       <p>'The Regiment was supposed to bypass Rocquancourt on the west, but due to a traffic jam, passed east of the town. B Coy got lost and ended up attached to the Royal Hamilton Light Infantry for a day.<br></p>\n                        \n                    </div>\n                </div>\n                    ",
            "tooltip": "\n                    <div style=\"text-align: center;\">\n                        <h2>Rocquancourt<br>08 Aug 44<br></h2>\n                        <p>Traffic Jam<br></p>\n                    </div>\n                    "
          },
          {
            "lngLat": [
              -0.308508,
              49.071387
            ],
            "popup": "\n                <div style=\"text-align: center; max-width:  600px\">\n                    <h2 style=\"margin: 0 0 10px 0; color: #2c3e50;\">Gaumesnil<br>08 Aug 44<br>  </h2>\n                    <img src=\"https://pd-allen.github.io/docs/images/TotalizeKangaroo.JPG\" width=\"550px\" style=\"border-radius:8px;\">\n                    <div style=\"text-align: left; padding: 0 10px;\">\n                       <p>'Instead they had continued on south with their infantry still aboard the Kangaroos. Lieutenant Colonel Anderson, his company commanders and their forward observation officers (FOO) dismounted to confer, minus of course B Company who were still missing.<br></p>\n                        \n                    </div>\n                </div>\n                    ",
            "tooltip": "\n                    <div style=\"text-align: center;\">\n                        <h2>Gaumesnil<br>08 Aug 44<br></h2>\n                        <p> <br></p>\n                    </div>\n                    "
          },
          {
            "lngLat": [
              -0.309881,
              49.081788
            ],
            "popup": "\n                <div style=\"text-align: center; max-width:  600px\">\n                    <h2 style=\"margin: 0 0 10px 0; color: #2c3e50;\">Fontenay-le-Marmion<br>08 Aug 44<br> U Turn</h2>\n                    <img src=\"https://pd-allen.github.io/docs/images/TotalizeRRCPlanB.JPG\" width=\"550px\" style=\"border-radius:8px;\">\n                    <div style=\"text-align: left; padding: 0 10px;\">\n                       <p>'At 0300 hrs, the remainder of our column, while somewhat scattered at times, had passed through the Bde dispersal area, and turned northwest. The original point at which we intended to cross the railroad tracks to move to our objective was not located by the leading tanks, and our column eventually crossed the tracks about a mile to the north. By 0430 hrs the Bn less \u2018B\u2019 Coy and some elements of \u2018C\u2019 Coy was concentrated in the low ground between the railway tracks and POINT 122. Once across the railway line, A Company took a south-easterly bearing to the top of the looming bulk of Point 122. With the danger of attacking in daylight and the already improving visibility as the dust cleared, the company commander elected to keep the infantry mounted and drive as far as possible before debussing. A Squadron of the Sherbrooke Fusiliers were the only tanks with the Royals and deployed to the flanks and rear to give covering fire.<br></p>\n                        \n                    </div>\n                </div>\n                    ",
            "tooltip": "\n                    <div style=\"text-align: center;\">\n                        <h2>Fontenay-le-Marmion<br>08 Aug 44<br></h2>\n                        <p>U Turn<br></p>\n                    </div>\n                    "
          },
          {
            "lngLat": [
              -0.293303,

                        .setLngLat([lng, lat]);
                    if (kwargs.popup) {
                        const popupMaxWidth = kwargs.popupMaxWidth || '240px';
                        marker.setPopup(new maplibregl.Popup({ maxWidth: popupMaxWidth }).setHTML(kwargs.popup));
                    }
                    marker.addTo(map);
                    // Add tooltip on hover if provided
                    if (kwargs.tooltip) {
                        const tooltipMaxWidth = kwargs.tooltipMaxWidth || '240px';
                        const tooltipPopup = new maplibregl.Popup({
                            closeButton: false,
                            closeOnClick: false,
                            maxWidth: tooltipMaxWidth
                        });
                        const markerEl = marker.getElement();
                        markerEl.addEventListener('mouseenter', () => {
                            tooltipPopup.setLngLat([lng, lat]).setHTML(kwargs.tooltip).addTo(map);
                        });
                        markerEl.addEventListener('mouseleave', () => {
                            tooltipPopup.remove();
                        });
                    }
                    // Track for layer control
                    markerGroups.set(markerId, [marker]);
                    markerGroupNames.set(markerId, markerId);
                    markerGroupVisibility.set(markerId, true);
                    markerGroupOpacity.set(markerId, 1);
                    break;
                }

                case 'addMarkers': {
                    const markersGroupId = kwargs.id || `markers-${Date.now()}`;
                    const markers = kwargs.markers || [];
                    const color = kwargs.color || '#3388ff';
                    const scale = kwargs.scale || 1.0;
                    const draggable = kwargs.draggable || false;
                    const popupMaxWidth = kwargs.popupMaxWidth || '240px';
                    const tooltipMaxWidth = kwargs.tooltipMaxWidth || '240px';
                    const groupMarkers = [];

                    for (const m of markers) {
                        const [lng, lat] = m.lngLat;
                        const marker = new maplibregl.Marker({ color, scale, draggable })
                            .setLngLat([lng, lat]);
                        if (m.popup) {
                            marker.setPopup(new maplibregl.Popup({ maxWidth: popupMaxWidth }).setHTML(m.popup));
                        }
                        marker.addTo(map);
                        // Add tooltip on hover if provided
                        if (m.tooltip) {
                            const tooltipPopup = new maplibregl.Popup({
                                closeButton: false,
                                closeOnClick: false,
                                maxWidth: tooltipMaxWidth
                            });
                            const markerEl = marker.getElement();
                            markerEl.addEventListener('mouseenter', () => {
                                tooltipPopup.setLngLat([lng, lat]).setHTML(m.tooltip).addTo(map);
                            });
                            markerEl.addEventListener('mouseleave', () => {
                                tooltipPopup.remove();
                            });
                        }
                        groupMarkers.push(marker);
                    }
                    // Track for layer control
                    markerGroups.set(markersGroupId, groupMarkers);
                    markerGroupNames.set(markersGroupId, markersGroupId);
                    markerGroupVisibility.set(markersGroupId, true);
                    markerGroupOpacity.set(markersGroupId, 1);
                    break;
                }

                case 'addLegend': {
                    const legendId = kwargs.id || 'legend';
                    const title = kwargs.title || 'Legend';
                    const items = kwargs.items || [];
                    const position = kwargs.position || 'bottom-right';
                    const opacity = kwargs.opacity !== undefined ? kwargs.opacity : 1.0;

                    // Create legend container
                    const legendDiv = document.createElement('div');
                    legendDiv.id = legendId;
                    legendDiv.className = 'maplibregl-ctrl legend-control';
                    legendDiv.style.cssText = `
                        background: rgba(255, 255, 255, ${opacity});
                        padding: 10px 14px;
                        border-radius: 4px;
                        box-shadow: 0 1px 4px rgba(0,0,0,0.3);
                        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                        font-size: 12px;
                        line-height: 1.4;
                        max-width: 200px;
                    `;

                    // Add title
                    const titleEl = document.createElement('div');
                    titleEl.style.cssText = 'font-weight: bold; margin-bottom: 8px; font-size: 13px;';
                    titleEl.textContent = title;
                    legendDiv.appendChild(titleEl);

                    // Add items
                    for (const item of items) {
                        const row = document.createElement('div');
                        row.style.cssText = 'display: flex; align-items: center; margin-bottom: 4px;';

                        const colorBox = document.createElement('span');
                        colorBox.style.cssText = `
                            width: 16px;
                            height: 16px;
                            background-color: ${item.color};
                            margin-right: 8px;
                            border-radius: 2px;
                            flex-shrink: 0;
                        `;
                        row.appendChild(colorBox);

                        const label = document.createElement('span');
                        label.textContent = item.label;
                        row.appendChild(label);

                        legendDiv.appendChild(row);
                    }

                    // Get the appropriate control container
                    const positionClass = 'maplibregl-ctrl-' + position;
                    let container = document.querySelector('.' + positionClass);
                    if (!container) {
                        // Create container if it doesn't exist
                        container = document.createElement('div');
                        container.className = 'maplibregl-ctrl-' + position.split('-')[0] + ' ' + positionClass;
                        document.querySelector('.maplibregl-control-container').appendChild(container);
                    }
                    // Insert at beginning so legend appears above attribution
                    container.insertBefore(legendDiv, container.firstChild);
                    break;
                }

                case 'addColorbar': {
                    const cbId = kwargs.colorbarId || 'colorbar-0';
                    const cbColormap = kwargs.colormap || 'viridis';
                    const cbVmin = kwargs.vmin !== undefined ? kwargs.vmin : 0;
                    const cbVmax = kwargs.vmax !== undefined ? kwargs.vmax : 1;
                    const cbLabel = kwargs.label || '';
                    const cbUnits = kwargs.units || '';
                    const cbOrientation = kwargs.orientation || 'horizontal';
                    const cbPosition = kwargs.position || 'bottom-right';
                    const cbBarThickness = kwargs.barThickness || 20;
                    const cbBarLength = kwargs.barLength || 250;
                    const cbOpacity = kwargs.opacity !== undefined ? kwargs.opacity : 1.0;

                    // Colormap gradients (CSS approximations)
                    const colormapGradients = {
                        'viridis': 'linear-gradient(to right, #440154, #482878, #3e4989, #31688e, #26828e, #1f9e89, #35b779, #6ece58, #b5de2b, #fde725)',
                        'plasma': 'linear-gradient(to right, #0d0887, #46039f, #7201a8, #9c179e, #bd3786, #d8576b, #ed7953, #fb9f3a, #fdca26, #f0f921)',
                        'inferno': 'linear-gradient(to right, #000004, #1b0c41, #4a0c6b, #781c6d, #a52c60, #cf4446, #ed6925, #fb9b06, #f7d13d, #fcffa4)',
                        'magma': 'linear-gradient(to right, #000004, #180f3d, #440f76, #721f81, #9e2f7f, #cd4071, #f1605d, #fd9668, #feca8d, #fcfdbf)',
                        'cividis': 'linear-gradient(to right, #00224e, #123570, #1f4b86, #2c6291, #3c7a91, #4f928c, #65ab7c, #84c267, #abd94f, #fdea45)',
                        'coolwarm': 'linear-gradient(to right, #3b4cc0, #6788ee, #9abbff, #c9d7ef, #eddad5, #f7a789, #e36c51, #b40426)',
                        'terrain': 'linear-gradient(to right, #333399, #00b2b2, #00ff00, #cccc00, #cc6600, #993300, #ffffff)',
                        'jet': 'linear-gradient(to right, #00007f, #0000ff, #007fff, #00ffff, #7fff7f, #ffff00, #ff7f00, #ff0000, #7f0000)',
                        'turbo': 'linear-gradient(to right, #30123b, #4662d7, #36aaf9, #1ae4b6, #72fe5e, #c8ef34, #faba39, #f66b19, #ca2a04, #7a0403)',
                        'hot': 'linear-gradient(to right, #000000, #e60000, #ffa500, #ffff00, #ffffff)',
                        'cool': 'linear-gradient(to right, #00ffff, #ff00ff)',
                        'gray': 'linear-gradient(to right, #000000, #ffffff)',
                        'rainbow': 'linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8f00ff)',
                    };
                    const isVertical = cbOrientation === 'vertical';
                    const gradientDir = isVertical ? 'to top' : 'to right';
                    let gradient = (colormapGradients[cbColormap] || colormapGradients['viridis']).replace('to right', gradientDir);

                    // Build colorbar element
                    const cbDiv = document.createElement('div');
                    cbDiv.id = cbId;
                    cbDiv.className = 'maplibregl-ctrl';
                    cbDiv.style.cssText = `
                        background: rgba(255, 255, 255, ${cbOpacity});
                        padding: 8px 12px;
                        border-radius: 4px;
                        box-shadow: 0 1px 4px rgba(0,0,0,0.3);
                        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                        font-size: 11px;
                    `;

                    if (cbLabel) {
                        const labelEl = document.createElement('div');
                        labelEl.style.cssText = 'font-weight: bold; margin-bottom: 4px; font-size: 12px; text-align: center;';
                        labelEl.textContent = cbLabel;
                        cbDiv.appendChild(labelEl);
                    }

                    const barEl = document.createElement('div');
                    barEl.style.cssText = isVertical
                        ? `width: ${cbBarThickness}px; height: ${cbBarLength}px; background: ${gradient}; border: 1px solid #ccc; margin: 0 auto;`
                        : `width: ${cbBarLength}px; height: ${cbBarThickness}px; background: ${gradient}; border: 1px solid #ccc;`;
                    cbDiv.appendChild(barEl);

                    // Tick labels
                    const tickCount = 5;
                    const ticksDiv = document.createElement('div');
                    ticksDiv.style.cssText = isVertical
                        ? `display: flex; flex-direction: column-reverse; justify-content: space-between; height: ${cbBarLength}px; position: absolute; right: -30px; top: 0; font-size: 10px;`
                        : `display: flex; justify-content: space-between; margin-top: 2px; font-size: 10px;`;
                    for (let i = 0; i < tickCount; i++) {
                        const val = cbVmin + (cbVmax - cbVmin) * i / (tickCount - 1);
                        const tickEl = document.createElement('span');
                        tickEl.textContent = val.toFixed(val % 1 === 0 ? 0 : 1);
                        ticksDiv.appendChild(tickEl);
                    }
                    if (!isVertical) {
                        cbDiv.appendChild(ticksDiv);
                    }

                    if (cbUnits) {
                        const unitsEl = document.createElement('div');
                        unitsEl.style.cssText = 'text-align: center; margin-top: 2px; font-size: 10px; color: #666;';
                        unitsEl.textContent = cbUnits;
                        cbDiv.appendChild(unitsEl);
                    }

                    // Add to map control container
                    const cbPosClass = 'maplibregl-ctrl-' + cbPosition;
                    let cbContainer = document.querySelector('.' + cbPosClass);
                    if (!cbContainer) {
                        cbContainer = document.createElement('div');
                        cbContainer.className = 'maplibregl-ctrl-' + cbPosition.split('-')[0] + ' ' + cbPosClass;
                        document.querySelector('.maplibregl-control-container').appendChild(cbContainer);
                    }
                    cbContainer.insertBefore(cbDiv, cbContainer.firstChild);
                    break;
                }

                case 'flyTo': {
                    map.flyTo({
                        center: [args[0], args[1]],
                        zoom: kwargs.zoom,
                        duration: kwargs.duration || 2000
                    });
                    break;
                }

                case 'fitBounds': {
                    const bounds = args[0];
                    map.fitBounds([
                        [bounds[0], bounds[1]],
                        [bounds[2], bounds[3]]
                    ], {
                        padding: kwargs.padding || 50,
                        duration: kwargs.duration || 1000
                    });
                    break;
                }

                case 'setVisibility': {
                    const [layerId, visible] = args;
                    if (map.getLayer(layerId)) {
                        map.setLayoutProperty(layerId, 'visibility', visible ? 'visible' : 'none');
                    }
                    if (deckLayers.has(layerId)) {
                        setCOGVisibility(layerId, visible);
                    }
                    break;
                }

                case 'setOpacity': {
                    const [layerId, opacity] = args;
                    if (map.getLayer(layerId)) {
                        const layer = map.getLayer(layerId);
                        const opacityProp = getOpacityProperty(layer.type);
                        if (opacityProp) {
                            map.setPaintProperty(layerId, opacityProp, opacity);
                        }
                    }
                    if (deckLayers.has(layerId)) {
                        setCOGOpacity(layerId, opacity);
                    }
                    break;
                }

                case 'addPMTilesLayer': {
                    const url = kwargs.url;
                    const layerId = kwargs.id;
                    const sourceType = kwargs.sourceType || 'vector';
                    const opacity = kwargs.opacity || 1.0;
                    const visible = kwargs.visible !== false;
                    const style = kwargs.style || {};
                    const prefix = kwargs.prefix || '';
                    const popupConfig = kwargs.popup || null;
                    const hasStyle = style && Object.keys(style).length > 0;

                    // Prepare PMTiles URL with protocol
                    const pmtilesUrl = url.startsWith('pmtiles://') ? url : `pmtiles://${url}`;

                    // Add source
                    const sourceId = `${layerId}-source`;
                    if (!map.getSource(sourceId)) {
                        map.addSource(sourceId, {
                            type: sourceType,
                            url: pmtilesUrl
                        });
                    }

                    // Auto-discovery for vector PMTiles without explicit style
                    if (sourceType === 'vector' && !hasStyle) {
                        try {
                            const pm = new PMTiles(url);
                            const header = await pm.getHeader();
                            const metadata = await pm.getMetadata();
                            const vectorLayers = metadata.vector_layers || (metadata.tilestats && metadata.tilestats.layers) || [];

                            if (vectorLayers.length > 0) {
                                // Generate distinct colors
                                const colors = vectorLayers.map((_, i) => {
                                    const hue = (i * 137.508) % 360;
                                    return `hsl(${hue}, 70%, 50%)`;
                                });

                                // Map geometry type to MapLibre layer type
                                function geoToType(gt) {
                                    if (!gt) return null;
                                    const lower = gt.toLowerCase();
                                    if (lower.includes('polygon')) return 'fill';
                                    if (lower.includes('line')) return 'line';
                                    if (lower.includes('point')) return 'circle';
                                    return 'fill';
                                }

                                // Infer layer type from name when geometry_type is missing
                                function inferFromName(name) {
                                    const lower = name.toLowerCase();
                                    const linePatterns = ['road','street','highway','path','route','rail','transit','boundary','boundaries','border','river','stream','canal','waterway','line','edge','track','ferry','bridge','tunnel','physical_line','transportation'];
                                    const pointPatterns = ['poi','pois','point','place','places','marker','stop','station','node','peak','city','town','village','label','symbol','icon','address','physical_point','mountain_peak'];
                                    for (const p of linePatterns) { if (lower === p || lower.includes(p)) return 'line'; }
                                    for (const p of pointPatterns) { if (lower === p || lower.includes(p)) return 'circle'; }
                                    return 'fill';
                                }

                                // Build paint for layer type
                                function buildPaint(mlType, color, op) {
                                    if (mlType === 'fill') return { 'fill-color': color, 'fill-opacity': op * 0.6, 'fill-outline-color': color };
                                    if (mlType === 'line') return { 'line-color': color, 'line-width': 2, 'line-opacity': op };
                                    return { 'circle-color': color, 'circle-radius': 2, 'circle-opacity': op, 'circle-stroke-color': color, 'circle-stroke-width': 0.5 };
                                }

                                const entries = vectorLayers.map((vl, i) => ({
                                    vl,
                                    color: colors[i],
                                    mlType: vl.geometry_type ? geoToType(vl.geometry_type) : inferFromName(vl.id),
                                }));

                                // Sort: fill first, then line, then circle
                                const order = { fill: 0, line: 1, circle: 2 };
                                entries.sort((a, b) => (order[a.mlType] || 0) - (order[b.mlType] || 0));

                                const subLayerIds = [];
                                for (const { vl, color, mlType } of entries) {
                                    const subId = prefix ? `${prefix}-${vl.id}` : vl.id;
                                    if (!map.getLayer(subId)) {
                                        map.addLayer({
                                            id: subId,
                                            type: mlType,
                                            source: sourceId,
                                            'source-layer': vl.id,
                                            layout: { visibility: visible ? 'visible' : 'none' },
                                            paint: buildPaint(mlType, color, opacity),
                                        });
                                        addedLayers.push({ id: subId, name: subId, type: mlType });
                                        subLayerIds.push(subId);
                                    }
                                }

                                // Register grouped popup
                                if (popupConfig && popupConfig.enabled && subLayerIds.length > 0) {
                                    const props = popupConfig.properties;
                                    const tmpl = popupConfig.template;
                                    map.on('click', (e) => {
                                        const allFeatures = [];
                                        for (const sid of subLayerIds) {
                                            if (!map.getLayer(sid)) continue;
                                            const feats = map.queryRenderedFeatures(e.point, { layers: [sid] });
                                            if (feats.length > 0) {
                                                allFeatures.push({ layer: feats[0].sourceLayer || sid, props: feats[0].properties || {} });
                                            }
                                        }
                                        if (allFeatures.length === 0) return;

                                        const popupCSS = `<style>
                                            .anymap-pmtiles-popup table { border-collapse:collapse;font-size:13px;color:#333;width:100%;table-layout:fixed;background:#fff; }
                                            .anymap-pmtiles-popup td { padding:4px 8px;border-bottom:1px solid #eee;color:#333;word-break:break-word;overflow-wrap:break-word; }
                                            .anymap-pmtiles-popup tr:last-child td { border-bottom:none; }
                                            .anymap-pmtiles-popup td:first-child { font-weight:600;color:#222;white-space:nowrap;width:40%; }
                                            .anymap-pmtiles-popup td:last-child { color:#444;width:60%; }
                                            .anymap-pmtiles-popup .section-header { font-weight:700;font-size:13px;color:#111;padding:6px 8px 4px 8px;text-transform:capitalize;background:#f0f0f0;border-bottom:1px solid #ddd; }
                                        </style>`;

                                        function buildHTML(p) {
                                            if (tmpl) {
                                                const replaced = tmpl.replace(/\{(\w+)\}/g, (m, k) => p[k] !== undefined ? String(p[k]) : m);
                                                return `<div style="font-size:13px;color:#333;line-height:1.4;word-break:break-word;padding:4px 0;">${replaced}</div>`;
                                            }
                                            const keys = props || Object.keys(p);
                                            const rows = keys.filter(k => p[k] !== undefined).map(k => `<tr><td>${k}</td><td>${p[k]}</td></tr>`).join('');
                                            return `<table>${rows}</table>`;
                                        }

                                        const sections = [];
                                        for (const { layer, props: fp } of allFeatures) {
                                            if (allFeatures.length > 1) sections.push(`<div class="section-header">${layer.replace(/[-_]/g, ' ')}</div>`);
                                            sections.push(buildHTML(fp));
                                        }
                                        new maplibregl.Popup({ maxWidth: '320px' })
                                            .setLngLat(e.lngLat)
                                            .setHTML(`${popupCSS}<div class="anymap-pmtiles-popup" style="max-height:300px;overflow-y:auto;">${sections.join('')}</div>`)
                                            .addTo(map);
                                    });
                                    for (const sid of subLayerIds) {
                                        map.on('mouseenter', sid, () => { map.getCanvas().style.cursor = 'pointer'; });
                                        map.on('mouseleave', sid, () => { map.getCanvas().style.cursor = ''; });
                                    }
                                }

                                // Fit bounds from header
                                if (kwargs.fitBounds) {
                                    map.fitBounds(
                                        [[header.minLon, header.minLat], [header.maxLon, header.maxLat]],
                                        { padding: 50, duration: 1000 }
                                    );
                                }
                            }
                        } catch (err) {
                            console.warn('[anymap-ts] PMTiles auto-discovery failed:', err);
                        }
                    } else if (!map.getLayer(layerId)) {
                        // Explicit style or raster
                        if (sourceType === 'vector') {
                            const layerStyle = {
                                id: layerId,
                                source: sourceId,
                                type: style.type || 'fill',
                                layout: { visibility: visible ? 'visible' : 'none' },
                                paint: {},
                            };
                            if (style['source-layer']) layerStyle['source-layer'] = style['source-layer'];

                            if (style.type === 'line') {
                                layerStyle.paint = { 'line-opacity': opacity, 'line-color': '#3388ff', 'line-width': 2, ...style };
                            } else if (style.type === 'circle') {
                                layerStyle.paint = { 'circle-opacity': opacity, 'circle-color': '#3388ff', 'circle-radius': 5, ...style };
                            } else {
                                layerStyle.paint = { 'fill-opacity': opacity, 'fill-color': '#3388ff', ...style };
                            }
                            delete layerStyle.paint.type;
                            delete layerStyle.paint['source-layer'];

                            map.addLayer(layerStyle);
                        } else {
                            map.addLayer({
                                id: layerId,
                                type: 'raster',
                                source: sourceId,
                                layout: { visibility: visible ? 'visible' : 'none' },
                                paint: { 'raster-opacity': opacity }
                            });
                        }
                        addedLayers.push({
                            id: layerId,
                            name: kwargs.name || layerId,
                            type: sourceType === 'vector' ? (style.type || 'fill') : 'raster'
                        });

                        if (kwargs.fitBounds) {
                            try {
                                const pm = new PMTiles(url);
                                const header = await pm.getHeader();
                                map.fitBounds(
                                    [[header.minLon, header.minLat], [header.maxLon, header.maxLat]],
                                    { padding: 50, duration: 1000 }
                                );
                            } catch (err) {
                                console.warn('[anymap-ts] PMTiles fitBounds failed:', err);
                            }
                        }
                    }

                    break;
                }

                case 'removePMTilesLayer': {
                    const rmLayerId = args[0];
                    const rmSourceId = `${rmLayerId}-source`;
                    // Remove all layers using this source (handles auto-discovered sub-layers)
                    for (const layer of map.getStyle().layers || []) {
                        if (layer.source === rmSourceId && map.getLayer(layer.id)) {
                            map.removeLayer(layer.id);
                            const idx = addedLayers.findIndex(l => l.id === layer.id);
                            if (idx > -1) addedLayers.splice(idx, 1);
                        }
                    }
                    if (map.getLayer(rmLayerId)) map.removeLayer(rmLayerId);
                    if (map.getSource(rmSourceId)) map.removeSource(rmSourceId);
                    const rmIdx = addedLayers.findIndex(l => l.id === rmLayerId);
                    if (rmIdx > -1) addedLayers.splice(rmIdx, 1);
                    break;
                }

                case 'setSky': {
                    const skySpec = {};
                    if (kwargs.skyColor !== undefined) skySpec['sky-color'] = kwargs.skyColor;
                    if (kwargs.skyHorizonBlend !== undefined) skySpec['sky-horizon-blend'] = kwargs.skyHorizonBlend;
                    if (kwargs.horizonColor !== undefined) skySpec['horizon-color'] = kwargs.horizonColor;
                    if (kwargs.horizonFogBlend !== undefined) skySpec['horizon-fog-blend'] = kwargs.horizonFogBlend;
                    if (kwargs.fogColor !== undefined) skySpec['fog-color'] = kwargs.fogColor;
                    if (kwargs.fogGroundBlend !== undefined) skySpec['fog-ground-blend'] = kwargs.fogGroundBlend;
                    if (kwargs.atmosphereBlend !== undefined) skySpec['atmosphere-blend'] = kwargs.atmosphereBlend;
                    map.setSky(skySpec);
                    break;
                }

                case 'removeSky': {
                    map.setSky(undefined);
                    break;
                }

                case 'addTerrain': {
                    const terrainSource = kwargs.source;
                    const terrainExaggeration = kwargs.exaggeration || 1.0;
                    const terrainSourceId = 'terrain-dem';
                    if (!map.getSource(terrainSourceId)) {
                        map.addSource(terrainSourceId, {
                            type: 'raster-dem',
                            tiles: [terrainSource.url],
                            tileSize: 256,
                            encoding: terrainSource.encoding === 'mapbox' ? 'mapbox' : 'terrarium'
                        });
                    }
                    map.setTerrain({
                        source: terrainSourceId,
                        exaggeration: terrainExaggeration
                    });
                    break;
                }

                case 'addImageLayer': {
                    const imgId = kwargs.id || 'image-' + Date.now();
                    const imgSourceId = imgId + '-source';
                    const imgUrl = kwargs.url;
                    const imgCoords = kwargs.coordinates;
                    const imgOpacity = kwargs.opacity !== undefined ? kwargs.opacity : 1.0;
                    if (imgUrl && imgCoords && imgCoords.length === 4) {
                        if (!map.getSource(imgSourceId)) {
                            map.addSource(imgSourceId, {
                                type: 'image',
                                url: imgUrl,
                                coordinates: imgCoords
                            });
                        }
                        if (!map.getLayer(imgId)) {
                            map.addLayer({
                                id: imgId,
                                type: 'raster',
                                source: imgSourceId,
                                paint: { 'raster-opacity': imgOpacity }
                            });
                            addedLayers.push({ id: imgId, name: imgId, type: 'raster' });
                        }
                    }
                    break;
                }

                case 'setFilter': {
                    const filterLayerId = kwargs.layerId;
                    const filterExpr = kwargs.filter || null;
                    if (filterLayerId && map.getLayer(filterLayerId)) {
                        map.setFilter(filterLayerId, filterExpr);
                    }

                            clearInterval(animTimer);
                            animTimer = null;
                            playBtn.textContent = '\u25B6';
                        }
                    };

                    playBtn.addEventListener('click', () => {
                        if (animTimer !== null) {
                            stopAnim();
                        } else {
                            playBtn.textContent = '\u23F8';
                            animTimer = setInterval(() => {
                                let val = Number(slider.value) + step;
                                if (val > max) val = min;
                                slider.value = String(val);
                                updateFilter(val);
                            }, interval);
                        }
                    });

                    container.appendChild(labelEl);
                    container.appendChild(slider);
                    container.appendChild(playBtn);

                    const controlContainer = map.getContainer().querySelector(`.maplibregl-ctrl-${position}`);
                    if (controlContainer) {
                        controlContainer.appendChild(container);
                    } else {
                        map.getContainer().appendChild(container);
                    }
                    timeSliderContainer = container;

                    if (autoPlay) {
                        playBtn.click();
                    }
                    break;
                }

                case 'removeTimeSlider': {
                    if (timeSliderContainer) {
                        timeSliderContainer.remove();
                        timeSliderContainer = null;
                    }
                    break;
                }

                case 'animateAlongRoute': {
                    const id = kwargs.id;
                    const coordinates = kwargs.coordinates;
                    const duration = kwargs.duration || 10000;
                    const loop = kwargs.loop !== false;
                    const markerColor = kwargs.markerColor || '#3388ff';
                    const markerSize = kwargs.markerSize || 1.0;
                    const showTrail = kwargs.showTrail === true;
                    const trailColor = kwargs.trailColor || '#3388ff';
                    const trailWidth = kwargs.trailWidth || 3;

                    const routeLength = _lineLength(coordinates);

                    const marker = new maplibregl.Marker({ color: markerColor, scale: markerSize })
                        .setLngLat(coordinates[0])
                        .addTo(map);

                    let trailSourceId;
                    let trailLayerId;
                    if (showTrail) {
                        trailSourceId = `${id}-trail-source`;
                        trailLayerId = `${id}-trail`;

                        if (!map.getSource(trailSourceId)) {
                            map.addSource(trailSourceId, {
                                type: 'geojson',
                                data: {
                                    type: 'Feature',
                                    properties: {},
                                    geometry: { type: 'LineString', coordinates: [] },
                                },
                            });
                        }

                        if (!map.getLayer(trailLayerId)) {
                            map.addLayer({
                                id: trailLayerId,
                                type: 'line',
                                source: trailSourceId,
                                paint: {
                                    'line-color': trailColor,
                                    'line-width': trailWidth,
                                    'line-opacity': 0.8,
                                },
                            });
                        }
                    }

                    const startTime = performance.now();
                    const trailCoords = [coordinates[0]];

                    const animate = (currentTime) => {
                        const animation = animations.get(id);
                        if (!animation) return;

                        if (animation.isPaused) {
                            animation.animationId = requestAnimationFrame(animate);
                            return;
                        }

                        let elapsed = (currentTime - animation.startTime) * animation.speed;
                        if (animation.pausedAt > 0) {
                            elapsed = (currentTime - animation.pausedAt + (animation.pausedAt - animation.startTime)) * animation.speed;
                        }

                        const progress = (elapsed % animation.duration) / animation.duration;
                        const distance = progress * routeLength;
                        const position = _pointAlong(coordinates, distance);

                        animation.marker.setLngLat(position);

                        if (showTrail && trailSourceId) {
                            trailCoords.push(position);
                            const source = map.getSource(trailSourceId);
                            if (source) {
                                source.setData({
                                    type: 'Feature',
                                    properties: {},
                                    geometry: { type: 'LineString', coordinates: trailCoords },
                                });
                            }
                        }

                        if (elapsed >= animation.duration && !loop) {
                            cancelAnimationFrame(animation.animationId);
                            animation.marker.remove();
                            if (animation.trailLayerId && map.getLayer(animation.trailLayerId)) {
                                map.removeLayer(animation.trailLayerId);
                            }
                            if (animation.trailSourceId && map.getSource(animation.trailSourceId)) {
                                map.removeSource(animation.trailSourceId);
                            }
                            animations.delete(id);
                            return;
                        }

                        animation.animationId = requestAnimationFrame(animate);
                    };

                    animations.set(id, {
                        animationId: requestAnimationFrame(animate),
                        marker,
                        isPaused: false,
                        speed: 1,
                        startTime,
                        pausedAt: 0,
                        duration,
                        coordinates,
                        loop,
                        trailSourceId,
                        trailLayerId,
                    });
                    break;
                }

                case 'pauseAnimation': {
                    const [id] = args;
                    const animation = animations.get(id);
                    if (!animation) break;
                    animation.isPaused = true;
                    animation.pausedAt = performance.now();
                    break;
                }

                case 'resumeAnimation': {
                    const [id] = args;
                    const animation = animations.get(id);
                    if (!animation || !animation.isPaused) break;
                    const pausedDuration = performance.now() - animation.pausedAt;
                    animation.startTime += pausedDuration;
                    animation.isPaused = false;
                    animation.pausedAt = 0;
                    break;
                }

                case 'setAnimationSpeed': {
                    const [id, speed] = args;
                    const animation = animations.get(id);
                    if (!animation) break;
                    animation.speed = speed;
                    break;
                }

                case 'stopAnimation': {
                    const [id] = args;
                    const animation = animations.get(id);
                    if (!animation) break;
                    cancelAnimationFrame(animation.animationId);
                    animation.marker.remove();
                    if (animation.trailLayerId && map.getLayer(animation.trailLayerId)) {
                        map.removeLayer(animation.trailLayerId);
                    }
                    if (animation.trailSourceId && map.getSource(animation.trailSourceId)) {
                        map.removeSource(animation.trailSourceId);
                    }
                    animations.delete(id);
                    break;
                }

                default:
                    console.log('Unknown method:', method);
            }
        }

        function getDefaultPaint(layerType) {
            const defaults = {
                circle: {
                    'circle-radius': 5,
                    'circle-color': '#3388ff',
                    'circle-opacity': 0.8,
                    'circle-stroke-width': 1,
                    'circle-stroke-color': '#ffffff'
                },
                line: {
                    'line-color': '#3388ff',
                    'line-width': 2,
                    'line-opacity': 0.8
                },
                fill: {
                    'fill-color': '#3388ff',
                    'fill-opacity': 0.5,
                    'fill-outline-color': '#0000ff'
                },
                raster: {
                    'raster-opacity': 1
                }
            };
            return defaults[layerType] || {};
        }

        function getOpacityProperty(layerType) {
            const opacityMap = {
                fill: 'fill-opacity',
                line: 'line-opacity',
                circle: 'circle-opacity',
                symbol: 'icon-opacity',
                raster: 'raster-opacity',
                'fill-extrusion': 'fill-extrusion-opacity'
            };
            return opacityMap[layerType];
        }

        let layerControlInstance = null;
        let layerControlOrderSyncTimer = null;

        function reorderDeckLayersFromLayerControl(layerOrder) {
            if (deckLayers.size <= 1) return;

            const currentLayers = new Map(deckLayers);
            const orderedDeckIds = layerOrder.filter(layerId => currentLayers.has(layerId));
            const seen = new Set();
            const reorderedEntries = [];

            for (const layerId of orderedDeckIds) {
                if (!currentLayers.has(layerId) || seen.has(layerId)) continue;
                reorderedEntries.push([layerId, currentLayers.get(layerId)]);
                seen.add(layerId);
            }

            for (const [layerId, layer] of currentLayers) {
                if (seen.has(layerId)) continue;
                reorderedEntries.push([layerId, layer]);
            }

            deckLayers.clear();
            for (const [layerId, layer] of reorderedEntries) {
                deckLayers.set(layerId, layer);
            }
        }

        function getSentinelBeforeIdForLayerControlOrder(layerOrder) {
            let lastDeckIndex = -1;
            for (let i = 0; i < layerOrder.length; i++) {
                if (deckLayers.has(layerOrder[i])) {
                    lastDeckIndex = i;
                }
            }

            if (lastDeckIndex < 0) {
                return undefined;
            }

            for (let i = lastDeckIndex + 1; i < layerOrder.length; i++) {
                const layerId = layerOrder[i];
                if (layerId !== DECK_SENTINEL_ID && map.getLayer(layerId)) {
                    return layerId;
                }
            }

            return undefined;
        }

        function handleLayerControlReorder(layerOrder) {
            if (deckLayers.size === 0) return;

            reorderDeckLayersFromLayerControl(layerOrder);

            if (!map.getLayer(DECK_SENTINEL_ID)) {
                updateDeckOverlay(true);
                return;
            }

            const sentinelBeforeId = getSentinelBeforeIdForLayerControlOrder(layerOrder);

            try {
                map.moveLayer(DECK_SENTINEL_ID, sentinelBeforeId);
            } catch (_err) {
                // Ignore unsupported move failures from custom/non-style layers.
            }

            updateDeckOverlay(true);
        }

        function getLayerControlOrder() {
            const styleLayers = map.getStyle()?.layers || [];
            const deckLayerIds = Array.from(deckLayers.keys());
            if (styleLayers.length === 0) {
                return deckLayerIds;
            }

            const orderedLayerIds = [];
            let insertedDeckLayers = false;

            for (const layer of styleLayers) {
                if (layer.id === DECK_SENTINEL_ID) {
                    if (!insertedDeckLayers) {
                        orderedLayerIds.push(...deckLayerIds);
                        insertedDeckLayers = true;
                    }
                    continue;
                }
                orderedLayerIds.push(layer.id);
            }

            if (!insertedDeckLayers) {
                orderedLayerIds.push(...deckLayerIds);
            }

            return orderedLayerIds;
        }

        function syncLayerControlOrder() {
            if (!layerControlInstance) return;

            const layerStates = layerControlInstance.state && layerControlInstance.state.layerStates;
            if (!layerStates || typeof layerControlInstance.buildLayerItems !== 'function') {
                return;
            }

            const desiredOrder = getLayerControlOrder();
            if (desiredOrder.length === 0) {
                return;
            }

            const currentOrder = Object.keys(layerStates);
            const hasBackground = currentOrder.includes('Background');
            const currentLayerIds = currentOrder.filter(layerId => layerId !== 'Background');
            const currentSet = new Set(currentLayerIds);
            const desiredSet = new Set(desiredOrder);
            const reorderedIds = [
                ...desiredOrder.filter(layerId => currentSet.has(layerId)),
                ...currentLayerIds.filter(layerId => !desiredSet.has(layerId)),
            ];

            if (reorderedIds.length === 0) {
                return;
            }

            const isSameOrder = reorderedIds.length === currentLayerIds.length
                && reorderedIds.every((layerId, index) => layerId === currentLayerIds[index]);
            if (isSameOrder) {
                return;
            }

            const reorderedStates = {};
            if (hasBackground && Object.prototype.hasOwnProperty.call(layerStates, 'Background')) {
                reorderedStates.Background = layerStates.Background;
            }
            reorderedIds.forEach((layerId) => {
                reorderedStates[layerId] = layerStates[layerId];
            });

            layerControlInstance.state.layerStates = reorderedStates;
            layerControlInstance.targetLayers = hasBackground
                ? ['Background', ...reorderedIds]
                : [...reorderedIds];
            layerControlInstance.buildLayerItems();
        }

        function scheduleLayerControlOrderSync() {
            if (!layerControlInstance) return;
            if (layerControlOrderSyncTimer !== null) {
                window.clearTimeout(layerControlOrderSyncTimer);
            }
            layerControlOrderSyncTimer = window.setTimeout(() => {
                syncLayerControlOrder();
                layerControlOrderSyncTimer = null;
            }, 150);
        }

        function createLayerControl(config) {
            const position = config.position || 'top-right';
            const collapsed = config.collapsed !== false;

            // Build layer IDs from addedLayers (excludes COG layers managed by adapter)
            const layerIds = addedLayers.map(layer => layer.id);

            // Include custom adapters for non-native layer types
            const customAdapters = [];
            if (deckLayers.size > 0) customAdapters.push(cogLayerAdapter);
            if (markerGroups.size > 0) customAdapters.push(markerLayerAdapter);

            layerControlInstance = new LayerControl({
                collapsed: collapsed,
                layers: layerIds,
                customLayerAdapters: customAdapters.length > 0 ? customAdapters : undefined,
                onLayerReorder: handleLayerControlReorder,
            });
            map.addControl(layerControlInstance, position);
            syncLayerControlOrder();
            scheduleLayerControlOrderSync();
        }

        function createDrawControl(config) {
            // Check if Geoman is available (UMD exports to Geoman.Geoman)
            const GeomanClass = (typeof Geoman !== 'undefined' && Geoman.Geoman)
                ? Geoman.Geoman
                : (typeof window !== 'undefined' && window.Geoman && window.Geoman.Geoman)
                    ? window.Geoman.Geoman
                    : null;

            if (!GeomanClass) {
                console.warn('Geoman library not loaded. Draw control not available.');
                return;
            }

            const position = config.position || 'top-right';
            const drawModes = config.drawModes || ['polygon', 'line', 'rectangle', 'circle', 'marker'];
            const editModes = config.editModes || ['select', 'drag', 'change', 'rotate', 'cut', 'delete', 'scale', 'copy', 'split', 'union', 'difference', 'simplify', 'lasso'];
            const collapsed = config.collapsed || false;

            // Initialize Geoman first
            const geoman = new GeomanClass(map, {});
            let editorCreated = false;

            const createEditor = () => {
                if (editorCreated) return;
                editorCreated = true;

                if (GeoEditorClass) {
                    // Use full GeoEditor UI (matches Jupyter widget behavior)
                    try {
                        const geoEditor = new GeoEditorClass({
                            position,
                            drawModes,
                            editModes,
                            fileModes: ['open', 'save'],
                            collapsed,
                            showFeatureProperties: false,
                            fitBoundsOnLoad: true,
                        });
                        geoEditor.setGeoman(geoman);
                        map.addControl(geoEditor, position);
                    } catch (error) {
                        console.error('Failed to create GeoEditor:', error);
                    }
                } else {
                    console.warn('GeoEditor not available, using Geoman fallback');
                }
            };

            map.on('gm:loaded', createEditor);
            setTimeout(() => { createEditor(); }, 1000);
        }
    </script>
</body>
